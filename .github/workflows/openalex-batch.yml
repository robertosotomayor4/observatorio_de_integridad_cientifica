name: Actualizar OpenAlex por lotes
on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: Revistas a procesar en esta ejecución
        required: false
        default: '2000'
  schedule:
    - cron: '27 5 * * *'
permissions:
  contents: write
concurrency:
  group: openalex-update
  cancel-in-progress: false
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Procesar lote OpenAlex
        env:
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '2000' }}
        run: python scripts/openalex_batch.py --batch-size "$BATCH_SIZE"
      - name: Regenerar capa pública OpenAlex
        run: python scripts/build_openalex_public.py
      - name: Validar que la clave no fue publicada
        env:
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import sys

          token = os.environ.get("OPENALEX_API_KEY", "").encode("utf-8")
          if not token:
              print("Falta el secreto OPENALEX_API_KEY")
              sys.exit(1)

          targets = [pathlib.Path("docs"), pathlib.Path("scripts"), pathlib.Path("data_openalex_queue.csv")]
          for target in targets:
              paths = [target] if target.is_file() else [p for p in target.rglob("*") if p.is_file()]
              for path in paths:
                  if token in path.read_bytes():
                      print(f"La clave apareció en {path}")
                      sys.exit(1)
          print("La clave no aparece en los archivos versionados.")
          PY
      - name: Guardar progreso
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data_openalex_queue.csv data/openalex/results docs/data/openalex
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Actualizar lote OpenAlex"
          git push
